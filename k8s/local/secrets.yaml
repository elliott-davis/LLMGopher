apiVersion: v1
kind: Secret
metadata:
  name: llmgopher-secrets
  labels:
    app: llmgopher
type: Opaque
stringData:
  # Postgres connection string (matches the postgres service below)
  postgres-dsn: "postgres://llmgopher:localdev@postgres:5432/llmgopher?sslmode=disable"

  # Redis password (matches the redis deployment)
  redis-password: "localdevredis"

  # Dummy LLM provider API keys (not real — for local testing only)
  openai-api-key: "sk-local-fake-openai-key-000000000000"
  anthropic-api-key: "sk-ant-local-fake-anthropic-key-0000"

  # Gateway API keys in KEY:ID format
  api-keys: "sk-test-key-1:key-001,sk-test-key-2:key-002"
